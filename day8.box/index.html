<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background: skyblue;
            width: 300px;
            height: 150px;
            text-align: center;

            border: 1px solid black;

            /* border: 2px dashed red; */

            /* border: 2px dotted green; */

            /* border: 4px double orange; */

            border-radius: 10px;

            padding: 20px;

            margin: 20px;

            /* margin: auto; */

            /* box-sizing: content-box;  It Will Include Width + Padding + Margin + Border */
           

            /* box-sizing: border-box;  Only Original Width Size */
             box-sizing: border-box;
            
        }

        p{
            border-bottom: 2px double red;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
     <p>Hello guys</p>
    </div>

    <div class="box">
     <p>Books</p>
    </div>
</body>
</html>
